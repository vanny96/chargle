<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chargle</title>
    <meta name="description"
        content="Can you guess the battery charge? A daily puzzle to test your visual estimation skills.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔋</text></svg>">
</head>

<body>
    <div class="container">
        <h1>🔋 CHARGLE</h1>

        <div class="battery-container">
            <div class="battery-fill" id="batteryFill"></div>
        </div>

        <div class="input-section">
            <input type="number" id="guessInput" min="0" max="100" placeholder="Enter %">
            <button id="guessBtn">Guess!</button>
        </div>

        <p class="attempts-text">Attempts: <span id="attemptCount">0/4</span></p>

        <div id="history" class="history-grid"></div>

        <p id="timer" style="margin-top: 30px; color: #888; font-family: monospace;"></p>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modalText"></h2>
            <script type='text/javascript' src='https://storage.ko-fi.com/cdn/widget/Widget_2.js'></script>
            <script
                type='text/javascript'>kofiwidget2.init('Buy me a coffee!', '#72a4f2', 'C0C21X612I'); kofiwidget2.draw();</script>
            <button id="closeModal">Close</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
